<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TODO App - Productivity Made Simple</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <h1><i class="fas fa-check-double"></i> TODO App</h1>
                <p class="subtitle">Stay organized, stay productive</p>
            </div>
            <div class="header-actions">
                <button id="themeToggle" class="theme-toggle" title="Toggle dark mode">
                    <i class="fas fa-moon"></i>
                </button>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Input Section -->
            <section class="input-section">
                <div class="input-wrapper">
                    <input 
                        type="text" 
                        id="todoInput" 
                        class="todo-input" 
                        placeholder="Add a new task..."
                        autocomplete="off"
                    >
                    <div class="input-actions">
                        <button id="addBtn" class="btn btn-primary" title="Add task">
                            <i class="fas fa-plus"></i> Add
                        </button>
                        <button id="clearAllBtn" class="btn btn-danger" title="Clear all completed tasks">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                </div>
            </section>

            <!-- Filter Section -->
            <section class="filter-section">
                <div class="filter-buttons">
                    <button class="filter-btn active" data-filter="all">
                        <i class="fas fa-list"></i> All
                    </button>
                    <button class="filter-btn" data-filter="active">
                        <i class="fas fa-circle"></i> Active
                    </button>
                    <button class="filter-btn" data-filter="completed">
                        <i class="fas fa-check-circle"></i> Completed
                    </button>
                </div>
                <div class="stats">
                    <span class="stat-item">
                        <i class="fas fa-tasks"></i>
                        <span id="totalCount">0</span> Total
                    </span>
                    <span class="stat-item">
                        <i class="fas fa-hourglass-end"></i>
                        <span id="activeCount">0</span> Active
                    </span>
                    <span class="stat-item">
                        <i class="fas fa-check"></i>
                        <span id="completedCount">0</span> Completed
                    </span>
                </div>
            </section>

            <!-- Sorting Section -->
            <section class="sorting-section">
                <label for="sortSelect">
                    <i class="fas fa-sort"></i> Sort by:
                </label>
                <select id="sortSelect" class="sort-select">
                    <option value="date-desc">Newest First</option>
                    <option value="date-asc">Oldest First</option>
                    <option value="priority">Priority</option>
                    <option value="name">Alphabetical</option>
                </select>
            </section>

            <!-- Search Section -->
            <section class="search-section">
                <input 
                    type="text" 
                    id="searchInput" 
                    class="search-input" 
                    placeholder="Search tasks..."
                    autocomplete="off"
                >
            </section>

            <!-- Todo List -->
            <section class="todos-section">
                <div id="todoList" class="todo-list">
                    <!-- Todos will be inserted here -->
                </div>
                <div id="emptyState" class="empty-state">
                    <i class="fas fa-inbox"></i>
                    <p>No tasks yet. Add one to get started!</p>
                </div>
            </section>
        </main>

        <!-- Footer -->
        <footer class="footer">
            <div class="footer-content">
                <p>&copy; 2026 TODO App - Designed with <i class="fas fa-heart"></i> by DIGJAYA</p>
                <div class="footer-links">
                    <button id="exportBtn" class="footer-btn" title="Export tasks">
                        <i class="fas fa-download"></i> Export
                    </button>
                    <button id="importBtn" class="footer-btn" title="Import tasks">
                        <i class="fas fa-upload"></i> Import
                    </button>
                    <button id="resetBtn" class="footer-btn" title="Reset all data">
                        <i class="fas fa-redo"></i> Reset
                    </button>
                </div>
            </div>
        </footer>
    </div>

    <!-- Modal for Edit -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Edit Task</h2>
                <button class="modal-close" id="closeModal">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <input 
                    type="text" 
                    id="editInput" 
                    class="edit-input" 
                    placeholder="Task description"
                >
                <select id="editPriority" class="priority-select">
                    <option value="low">Low Priority</option>
                    <option value="medium">Medium Priority</option>
                    <option value="high">High Priority</option>
                </select>
                <textarea 
                    id="editNotes" 
                    class="edit-notes" 
                    placeholder="Add notes..."
                    rows="4"
                ></textarea>
            </div>
            <div class="modal-footer">
                <button id="cancelEdit" class="btn btn-secondary">
                    <i class="fas fa-times"></i> Cancel
                </button>
                <button id="saveEdit" class="btn btn-primary">
                    <i class="fas fa-save"></i> Save Changes
                </button>
            </div>
        </div>
    </div>

    <!-- Hidden file input for import -->
    <input type="file" id="fileInput" accept=".json" style="display: none;">

    <script src="js/storage.js"></script>
    <script src="js/todo.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
</body>
</html>

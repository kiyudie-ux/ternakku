version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: digjaya_db
    environment:
      POSTGRES_DB: digjaya
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: digjaya_redis
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    container_name: digjaya_backend
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:postgres123@postgres:5432/digjaya
      REDIS_URL: redis://redis:6379
      MIDTRANS_SERVER_KEY: ${MIDTRANS_SERVER_KEY}
      MIDTRANS_CLIENT_KEY: ${MIDTRANS_CLIENT_KEY}
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    container_name: digjaya_frontend
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:5000
      REACT_APP_MIDTRANS_CLIENT_KEY: ${MIDTRANS_CLIENT_KEY}
    depends_on:
      - backend
    volumes:
      - ./frontend:/app

volumes:
  postgres_data: